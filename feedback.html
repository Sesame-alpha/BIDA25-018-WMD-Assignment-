<!DOCTYPE html>
<html lang="en">
<head> <!-- same head --> </head>
<body>
    <header> <!-- same header --> </header>
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-7">
                <h2 class="text-center mb-3">We value your feedback!</h2>
                <p class="text-center mb-4">Please let us know about your experience.</p>
                <form id="feedbackForm">
                    <div class="mb-3"><label class="form-label">Full Name(s)</label><input type="text" id="fbName" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="fbEmail" class="form-control" required></div>
                    <div class="mb-3">
                        <label class="form-label">Rating</label><br>
                        <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="rating" value="Excellent"> Excellent</div>
                        <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="rating" value="Fair"> Fair</div>
                        <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="rating" value="Good"> Good</div>
                        <div class="form-check form-check-inline"><input class="form-check-input" type="radio" name="rating" value="Poor"> Poor</div>
                    </div>
                    <div class="mb-3"><label class="form-label">Feedback message</label><textarea id="fbMessage" rows="4" class="form-control" required></textarea></div>
                    <div class="text-center"><button type="reset" class="btn btn-secondary me-3">Clear Form</button><button type="submit" class="btn btn-pink">Submit Form</button></div>
                </form>
            </div>
        </div>
    </main>
    <footer> <!-- same footer --> </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="js/script.js"></script>
</body>
</html>
