<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Royal Paws Veterinary Clinic | Bookings</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Same header -->
<header>...</header>

<main class="container my-5 hero-gradient">
    <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card p-4 p-md-5 shadow-lg border-0 rounded-4">
                <h2 class="text-center mb-4 fw-bold text-pink">🐾 Book With Us 🐾</h2>
                <form id="bookingForm">
                    <div class="mb-3"><label class="form-label fw-bold">Full Name(s)</label><input type="text" id="fullName" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">Email</label><input type="email" id="email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">Phone Number</label><input type="tel" id="phone" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label fw-bold">Pet Type</label><select id="petType" class="form-select" required><option value="dog">🐕 Dog</option><option value="cat">🐈 Cat</option></select></div>
                    <div class="mb-4"><label class="form-label fw-bold">Pet Service Requested</label><select id="service" class="form-select" required></select></div>
                    <div class="d-flex justify-content-center gap-3">
                        <button type="reset" class="btn btn-outline-pink">Cancel</button>
                        <button type="submit" class="btn btn-pink">Submit</button>
                    </div>
                </form>
                <div id="bookingMessage" class="alert alert-success text-center mt-4" style="display: none;">
                    <i class="fas fa-check-circle me-2"></i> Thank you for booking with us! You’ll soon receive an email confirmation. ❤️
                </div>
                <div id="bookingTempMessage" class="alert alert-info text-center mt-3" style="display: none;"></div>
            </div>
        </div>
    </div>
</main>

<!-- Same footer -->
<footer>...</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
<script src="script.js"></script>
</body>
</html>
