<!DOCTYPE html>
<html lang="en">
<head> <!-- same head as before --> </head>
<body>
    <header> <!-- same header --> </header>
    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <h2 class="text-center mb-4">Book With Us</h2>
                <form id="bookingForm">
                    <div class="mb-3"><label class="form-label">Full Name(s)</label><input type="text" id="fullName" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Email</label><input type="email" id="email" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Phone Number</label><input type="tel" id="phone" class="form-control" required></div>
                    <div class="mb-3"><label class="form-label">Pet Service Requested</label><select id="service" class="form-select"><option>Wellness Exam</option><option>Vaccination</option><option>Dental Cleaning</option><option>Emergency Care</option></select></div>
                    <div class="text-center"><button type="reset" class="btn btn-secondary me-3">Cancel</button><button type="submit" class="btn btn-pink">Submit</button></div>
                </form>
            </div>
        </div>
    </main>
    <footer> <!-- same footer --> </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <script src="js/script.js"></script>
</body>
</html>
